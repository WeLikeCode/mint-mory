[project]
name = "mintmory-api"
version = "0.1.0"
description = "MintMory HTTP REST API via FastAPI"
requires-python = ">=3.12"
dependencies = [
    "mintmory-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.12",
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mintmory"]

[tool.uv.sources]
mintmory-core = { workspace = true }

[project.scripts]
mintmory-api = "mintmory.api.app:main"
