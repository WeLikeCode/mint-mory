[project]
name = "mintmory-core"
version = "0.1.0"
description = "MintMory core: Palantir-inspired typed memory ontology with SQLite storage"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.8",
    "pydantic-settings>=2.4",
    "sqlite-vec>=0.1.6",        # Vector search within SQLite (small loadable dylib)
    "numpy>=1.26",              # Embedding arithmetic
    "python-ulid>=3.0",         # ULID for ordered IDs
    "structlog>=24.4",          # Structured logging
]

[project.optional-dependencies]
# ADR-0004: sentence-transformers (and its PyTorch dependency, ~2GB) ships only
# with the `local` extra. Core without the extra omits PyTorch — suitable for
# OpenAI-only deployments and fast test environments that inject a mock embedder.
local = ["sentence-transformers>=3.1"]   # Local embeddings (all-MiniLM-L6-v2, 384 dims)
openai = ["openai>=1.50"]                 # OpenAI embedding provider (imported lazily)
anthropic = ["anthropic>=0.35"]           # Anthropic provider (future, imported lazily)
docs = ["markitdown[all]>=0.1.0"]         # MS markitdown: docx/pdf/xlsx/pptx/... -> markdown (imported lazily)
otel = [                                  # OpenTelemetry export (off by default; no-op shim when absent)
    "opentelemetry-sdk>=1.27",
    "opentelemetry-exporter-otlp-proto-http>=1.27",
]
image = ["Pillow>=10.0"]              # downscale large image payloads (lazy import; absent -> size-cap/skip)
ocr = ["pytesseract>=0.3.10"]         # local OCR for the future 'ocr' vision provider (stubbed in v1)
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mintmory"]
