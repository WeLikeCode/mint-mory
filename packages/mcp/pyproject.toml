[project]
name = "mintmory-mcp"
version = "0.1.0"
description = "MintMory MCP server — stdio and SSE transports via fastmcp"
requires-python = ">=3.12"
dependencies = [
    "mintmory-core",
    "fastmcp>=2.3",
    "mcp>=1.6",
    "anthropic>=0.35",   # LLM passive self-assessment
    "structlog>=24.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mintmory"]

[tool.uv.sources]
mintmory-core = { workspace = true }

[project.scripts]
mintmory-mcp = "mintmory.mcp.server:main"
mintmory-history-mcp = "mintmory.mcp.history_server:main"
