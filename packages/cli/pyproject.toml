[project]
name = "mintmory-cli"
version = "0.1.0"
description = "MintMory CLI — stdio usage via Typer"
requires-python = ">=3.12"
dependencies = [
    "mintmory-core",
    "typer[all]>=0.12",
    "rich>=13.8",
    "structlog>=24.4",
]

[project.optional-dependencies]
docs = ["mintmory-core[docs]"]            # pulls markitdown via core's docs extra

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mintmory"]

[tool.uv.sources]
mintmory-core = { workspace = true }

[project.scripts]
mintmory = "mintmory.cli.main:app"
