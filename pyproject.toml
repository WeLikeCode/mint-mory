[tool.uv.workspace]
members = [
    "packages/core",
    "packages/mcp",
    "packages/api",
    "packages/cli",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "httpx>=0.27",          # async test client for FastAPI
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=3.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "packages/core/tests",
    "packages/mcp/tests",
    "packages/api/tests",
    "packages/cli/tests",
    "tests/integration",
]
addopts = "--import-mode=importlib --cov=packages --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "ANN"]
# ANN401 (Any) is noise; UP042 would force StrEnum over the deliberate
# `(str, Enum)` pattern used for every enum in types.py (changing str()/format
# semantics and risking serialisation drift).
ignore = ["ANN401", "UP042"]

[tool.ruff.lint.flake8-bugbear]
# typer requires Argument()/Option() calls in parameter defaults (B008 is wrong here)
extend-immutable-calls = ["typer.Argument", "typer.Option"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
# mintmory is a PEP 420 namespace package split across four src roots; tell mypy
# where to find them so cross-package imports resolve to real types (not Any).
mypy_path = "packages/core/src:packages/mcp/src:packages/api/src:packages/cli/src"
explicit_package_bases = true
namespace_packages = true
